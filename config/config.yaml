# ═══════════════════════════════════════════════════════════════
# TrendRadar 配置文件 - 冥鲲定制版
# 聚焦：AI自动化、Agent、SaaS、副业机会
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"  # 全天推送 + 晚间当日汇总

# ═══════════════════════════════════════════════════════════════
# 数据源 - 只保留科技/AI相关的平台
# ═══════════════════════════════════════════════════════════════
platforms:
  enabled: true
  sources:
    - id: "zhihu"
      name: "知乎"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "weibo"
      name: "微博"
    - id: "toutiao"
      name: "今日头条"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"

# ═══════════════════════════════════════════════════════════════
# RSS订阅 - 科技/AI相关
# ═══════════════════════════════════════════════════════════════
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - id: "producthunt"
      name: "Product Hunt"
      url: "https://www.producthunt.com/feed"
    - id: "techcrunch"
      name: "TechCrunch"
      url: "https://techcrunch.com/feed/"

# ═══════════════════════════════════════════════════════════════
# 报告模式
# ═══════════════════════════════════════════════════════════════
report:
  mode: "incremental"  # 只看新增，最少打扰
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ═══════════════════════════════════════════════════════════════
# 筛选 - 用关键词模式（零成本，不需要AI API）
# ═══════════════════════════════════════════════════════════════
filter:
  method: "keyword"

# ═══════════════════════════════════════════════════════════════
# 推送渠道 - 飞书
# ⚠️ 需要填入你的飞书机器人Webhook地址
# ═══════════════════════════════════════════════════════════════
push:
  feishu:
    enabled: true
    webhook_url: "YOUR_FEISHU_WEBHOOK_URL"  # ← 替换为你的飞书webhook
    # 格式: https://open.feishu.cn/open-apis/bot/v2/hook/xxxxx
